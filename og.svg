<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1.4" fill="rgba(0,0,0,0.10)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fbf7ee"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- title chip -->
  <g transform="translate(80 130) rotate(-2)">
    <rect x="0" y="0" width="640" height="120" fill="#ffd84d" stroke="#1a1a1a" stroke-width="6"/>
    <text x="32" y="90" font-family="Verdana, sans-serif" font-size="78" font-weight="900" fill="#1a1a1a">time boxing !!</text>
  </g>

  <!-- subtitle chip -->
  <g transform="translate(110 290) rotate(1)">
    <rect x="0" y="0" width="540" height="60" fill="#ffb3c1" stroke="#1a1a1a" stroke-width="4"/>
    <text x="20" y="42" font-family="Verdana, sans-serif" font-size="30" font-weight="700" fill="#1a1a1a">plan your day, one chonk at a time</text>
  </g>

  <!-- description -->
  <text x="110" y="430" font-family="Verdana, sans-serif" font-size="28" fill="#1a1a1a">drag activities onto a timeline.</text>
  <text x="110" y="475" font-family="Verdana, sans-serif" font-size="28" fill="#1a1a1a">see where your hours actually go.</text>

  <!-- url chip -->
  <g transform="translate(110 525) rotate(-1)">
    <rect x="0" y="0" width="320" height="56" fill="#b8e6b2" stroke="#1a1a1a" stroke-width="4"/>
    <text x="18" y="40" font-family="Verdana, sans-serif" font-size="26" font-weight="700" fill="#1a1a1a">timeboxing.jaye.es</text>
  </g>

  <!-- clock illustration -->
  <g transform="translate(940 320)">
    <rect x="-180" y="-180" width="360" height="360" rx="30" fill="#fbf7ee" stroke="#1a1a1a" stroke-width="8"/>
    <circle cx="0" cy="20" r="120" fill="#ffd84d" stroke="#1a1a1a" stroke-width="8"/>
    <line x1="0" y1="20" x2="0" y2="-60" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <line x1="0" y1="20" x2="70" y2="50" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
    <circle cx="0" cy="20" r="8" fill="#1a1a1a"/>
    <line x1="0" y1="-90" x2="0" y2="-78" stroke="#1a1a1a" stroke-width="6"/>
    <line x1="0" y1="118" x2="0" y2="130" stroke="#1a1a1a" stroke-width="6"/>
    <line x1="-118" y1="20" x2="-130" y2="20" stroke="#1a1a1a" stroke-width="6"/>
    <line x1="118" y1="20" x2="130" y2="20" stroke="#1a1a1a" stroke-width="6"/>
    <line x1="-95" y1="-90" x2="-115" y2="-115" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
    <line x1="95" y1="-90" x2="115" y2="-115" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
